<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YouTube Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header>
      <img src="logo.png" alt="">
      <h1>YouTube Downloader</h1>
    </header>
    <label>
      Server URL
      <input id="server-url" type="url" placeholder="http://127.0.0.1:8080/">
    </label>
    <button class="secondary" id="save-server">Save Server</button>
    <label>
      YouTube URL
      <input id="youtube-url" type="url" placeholder="https://www.youtube.com/watch?v=...">
    </label>
    <button id="download-txt">Download TXT</button>
    <section aria-label="Download status">
      <h2>Downloads</h2>
      <div id="jobs" class="jobs"><div class="muted">No active downloads.</div></div>
    </section>
    <p id="status"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
