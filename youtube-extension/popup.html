<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YouTube Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main>
    <header>
      <img src="logo.png" alt="">
      <h1>YouTube Downloader</h1>
    </header>
    <div class="grid">
      <button data-type="video">MP4</button>
      <button data-type="audio">MP3</button>
      <button data-type="srt">SRT</button>
      <button data-type="txt">TXT</button>
    </div>
    <button class="secondary" id="open-app">Open App</button>
    <p id="status"></p>
  </main>
  <script src="popup.js"></script>
</body>
</html>
